# nfpm config for podmaker-vault-bridge.
#
# Builds .deb (Debian/Ubuntu) + .rpm (RHEL/Fedora) packages from
# the pre-built binary in bin/release/. Run via:
#
#     nfpm pkg --packager deb --target bin/release/
#     nfpm pkg --packager rpm --target bin/release/
#
# Variables ($SOURCE / $VERSION / $ARCH) are injected by the CI
# matrix so the same template emits a per-arch artefact.

name:        podmaker-vault-bridge
arch:        ${ARCH}
platform:    linux
version:     ${VERSION}
section:     net
priority:    optional
maintainer:  PodMaker <ops@podmaker.sh>
homepage:    https://podmaker.sh/docs/vault-bridge
description: |
  Outbound proxy daemon from a customer network to the PodMaker
  control plane. Long-polls the CP, runs vault calls against the
  configured upstream (OpenBao, HashiCorp Vault, AWS Secrets
  Manager, Doppler, …), and posts the result back over mTLS.
vendor:      PodMaker
license:     MIT

depends:
  - ca-certificates

# Bundle the static binary at /usr/local/bin and ship the systemd
# unit + env template under /lib/systemd/system + /etc.
contents:
  - src: ${SOURCE}
    dst: /usr/local/bin/podmaker-vault-bridge
    file_info:
      mode: 0755

  - src: ../systemd/podmaker-vault-bridge.service
    dst: /lib/systemd/system/podmaker-vault-bridge.service
    file_info:
      mode: 0644

  - src: ../systemd/podmaker-vault-bridge.env.example
    dst: /etc/podmaker-vault-bridge.env.example
    file_info:
      mode: 0644
    type: config

# Create the service user, register the unit, suggest the operator
# fill in the env file. Idempotent across upgrades.
scripts:
  postinstall: deploy/nfpm/scripts/postinstall.sh
  preremove:   deploy/nfpm/scripts/preremove.sh
  postremove:  deploy/nfpm/scripts/postremove.sh

overrides:
  rpm:
    depends:
      - ca-certificates
      - shadow-utils

deb:
  fields:
    Built-By: PodMaker Release Pipeline
  signature:
    # GPG signing of .deb is optional — CI passes the key
    # material via env when secrets are configured.
    key_file: ${GPG_KEY_FILE}
    key_id:   ${GPG_KEY_ID}

rpm:
  signature:
    key_file: ${GPG_KEY_FILE}
    key_id:   ${GPG_KEY_ID}
