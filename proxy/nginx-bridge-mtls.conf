# PodMaker control plane — Vault Bridge mTLS termination template.
#
# Drops in front of the Laravel app on the same host. Terminates
# TLS, enforces mTLS for the `/api/v1/vault-bridges/{id}/...`
# subtree, and forwards the verified client cert headers the
# VaultBridgeController expects.
#
# Required nginx modules: ngx_http_ssl_module, ngx_http_proxy_module.
#
# Refresh the CA + CRL bundle once a day from the CP:
#
#     curl -fsSL https://app.podmaker.sh/api/v1/vault-bridges/ca.pem \
#          -o /etc/nginx/bridge-mtls/ca.pem
#     for ws in $(your-workspace-list); do
#         curl -fsSL "https://app.podmaker.sh/api/v1/vault-bridges/workspaces/${ws}/crl.pem" \
#              -o "/etc/nginx/bridge-mtls/${ws}.crl.pem"
#     done
#     systemctl reload nginx

upstream podmaker_cp {
    server 127.0.0.1:8000;            # Laravel listener — adjust to your runtime
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name app.podmaker.sh;

    # Server cert (Let's Encrypt, Caddy-managed, manual — whichever).
    ssl_certificate     /etc/letsencrypt/live/app.podmaker.sh/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/app.podmaker.sh/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # mTLS trust anchor + revocation list. ssl_verify_client is
    # `optional` so the SaaS dashboard still loads for browsers
    # without a cert; the bridge endpoints below enforce.
    ssl_client_certificate /etc/nginx/bridge-mtls/ca.pem;
    ssl_crl                /etc/nginx/bridge-mtls/crl.pem;
    ssl_verify_client      optional;
    ssl_verify_depth       2;

    # ---------------------------------------------------------------
    # Bridge agent API — mTLS required. The CP-side
    # `resolveBridge()` rechecks the fingerprint + revoke state, so
    # this layer is the first hop and the cheap fast-reject path.
    # ---------------------------------------------------------------
    location ~ ^/api/v1/vault-bridges/[^/]+/(cert|poll|respond|heartbeat|update-report)$ {
        if ($ssl_client_verify != SUCCESS) {
            return 403;
        }
        proxy_set_header X-SSL-Client-Verify  $ssl_client_verify;
        proxy_set_header X-SSL-Client-Cert    $ssl_client_escaped_cert;
        proxy_set_header X-SSL-Client-S-DN    $ssl_client_s_dn;
        proxy_set_header X-Forwarded-Proto    https;
        proxy_set_header Host                 $host;
        proxy_pass http://podmaker_cp;
    }

    # Public mTLS surface: ca.pem / crl.pem / crl.json / ocsp.
    # No client cert needed here — front proxies pin these.
    location /api/v1/vault-bridges/ {
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://podmaker_cp;
    }

    # Everything else — normal SaaS traffic.
    location / {
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_pass http://podmaker_cp;
    }
}
